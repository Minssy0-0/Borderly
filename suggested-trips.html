<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Feed | Borderly</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="profile.css">
    <link rel="stylesheet" href="suggested-trips.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<body>
<header>
  <nav>
    <div class="navbar">
      <div class="nav-left">
          <button id="cloudToggle" class="cloud-nav">☁️</button>
          <navmenu>
              <a href="javascript:openDocumentsModal()">Documents</a>
              <a href="javascript:openLuggageModal()">Luggage</a>
              <a href="javascript:openVaccinesModal()">Vaccines</a>
              <a href="javascript:openVisasModal()">Visas</a>
              <a href="checker.html">Travel Insurance</a>
          </navmenu>
          <div id="navAuthSection" class="nav-auth-group">
        <a href="javascript:void(0)" onclick="gatekeeper('profile.html')" class="nav-icon-link" title="Profile">
            <div class="profile-circle">
                <img src="Stock/defaultPic.webp" id="navAvatar" alt="User" class="nav-profile-pic">
            </div>
        </a>
    </div>
      </div>

      <div class="logo">
        <a href="index.html"><img src="Stock/logo sample (2).png" alt="Borderly logo"></a>
      </div>


      <div class="nav-right">
          <div class="diary-wrapper-outer">
              <div class="diary-wrapper" id="globalDiaryWrapper">
                  <a href="javascript:void(0)" onclick="handleDiaryClick()" class="diary-link">
                      <div class="diary-circle" id="diaryCircle">
                          <i class="fa-solid fa-book-atlas"></i>
                          <span>Diary</span>
                      </div>
                  </a>
                  <div class="diary-dropdown" id="diaryDropdown">
                      <div class="dropdown-header">Trip Diary</div>
                      <div id="diaryPreviewContent"></div>
                  </div>
              </div>
          </div>
      </div>
    </div>
  </nav>
</header>

<main>
    <div class="community-header">
        <h1 class="bubbly-title">Borderly Board</h1>
        <p class="bubbly-subtitle">Browse easy to travel places based on your current location.</p>
        
        <div class="board-controls">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="boardSearchInput" placeholder="Enter your current country (e.g. Slovakia)..." oninput="filterBoard()">
            </div>
        </div>
    </div>

    <div id="suggested-grid" class="board-container"></div>
</main>

<script src="database.js"></script>
<script src="auth.js"></script>
<script src="suggested.js"></script> 
<script src="cloude.js"></script>>
</body>
</html>
